name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
     # КРОК 1: Встановлюємо Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

          # КРОК 2: Встановлюємо залежності (ігноруючи конфлікти версій)
      - name: Install dependencies
        run: npm install --legacy-peer-deps

        # КРОК 3: Самі запускаємо білд Nx
      - name: Build Project
        run: npx nx build shop --prod

      # КРОК 3.5: Ми готуємо окрему папку 'deploy_dist'
      # Це гарантує, що index.html буде саме в її корені
      - name: Prepare Deployment Folder
        run: |
          mkdir deploy_dist
          cp -r dist/apps/shop/browser/* deploy_dist/
          cp deploy_dist/index.csr.html deploy_dist/index.html || true
          ls -R deploy_dist # Для перевірки в логах

        # КРОК 4: Завантажуємо результат в Azure
      - name: Deploy to Azure
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_POLITE_WAVE_00C4EB61E }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "deploy_dist"
          api_location: ""
          output_location: ""
          skip_app_build: true

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_POLITE_WAVE_00C4EB61E }}
          action: "close"
