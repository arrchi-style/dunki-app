    <header class="bg-blue-500 text-white p-6">
      <h1 class="text-3xl font-bold">{{ restaurant.name }}</h1>
      <p class="text-lg">{{ restaurant.description }}</p>
    </header>

    <div class="p-6">
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        @for (dish of dishes; track dish.id) {
          <div class="bg-white shadow-md rounded-lg p-4 border">
            <h3 class="text-xl font-semibold mb-2">{{ dish.name }}</h3>
            <p class="text-gray-600 mb-2">{{ dish.description }}</p>
            <p class="text-lg font-bold mb-4">\${{ dish.price }}</p>
            <button
              (click)="addToCart(dish)"
              class="bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600"
            >
              Add to Cart
            </button>
          </div>
        }
      </div>

      <div class="mt-8 p-4 bg-gray-100 rounded">
        <h2 class="text-2xl font-bold">Cart Total: \${{ totalPrice() }}</h2>
        <p>Items in cart: {{ cart().length }}</p>
      </div>
    </div>
